name: Build RC
on:
  push:
    branches:
      - '**'
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Setup Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
          
      - name: Build with Gradle 8.11.1
        run: gradle build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustyConnector
          path: |
            ${{ github.workspace }}/fabric/build/libs/rustyconnector-*.jar
            ${{ github.workspace }}/velocity/build/libs/rustyconnector-*.jar
            ${{ github.workspace }}/paper/build/libs/rustyconnector-*.jar
